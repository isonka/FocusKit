name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List package schemes
        run: xcodebuild -list

      - name: Run FocusKit tests on available iOS simulator
        run: |
          xcodebuild test \
            -scheme FocusKit-Package \
            -destination 'platform=iOS Simulator,name=iPhone 15'
