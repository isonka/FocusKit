name: FocusKitExample
options:
  minimumXcodeGenVersion: 2.42.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  FocusKit:
    path: ../
targets:
  FocusKitExample:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FocusKitExample
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusKitExample
        PRODUCT_NAME: FocusKitExample
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FocusKitExample
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: FocusKit
        product: FocusKit
    scheme:
      testTargets: []
